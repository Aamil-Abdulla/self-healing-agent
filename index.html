<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Self-Healing Code Agent</title>
    <style>
        body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        h1 { color: #4ec9b0; }
        textarea { width: 100%; height: 150px; background: #2d2d2d; color: #d4d4d4; border: 1px solid #444; padding: 10px; font-family: monospace; font-size: 14px; }
        button { margin-top: 10px; padding: 10px 20px; background: #4ec9b0; color: #000; border: none; cursor: pointer; font-size: 16px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .attempt { margin: 10px 0; padding: 10px; border-left: 4px solid #f44; background: #2d2d2d; }
        .attempt.success { border-left-color: #4ec9b0; }
        .section { margin-top: 20px; }
        pre { background: #2d2d2d; padding: 15px; overflow-x: auto; white-space: pre-wrap; }
        label { display: block; margin-top: 15px; color: #9cdcfe; }
    </style>
</head>
<body>
    <h1>🔧 Self-Healing Code Agent</h1>

    <label>Broken Code:</label>
    <textarea id="original_code" placeholder="Paste your broken code here..."></textarea>

    <label>Task Description:</label>
    <textarea id="task_description" placeholder="What should this code do?"></textarea>

    <button id="btn" onclick="runAgent()">▶ Run Agent</button>

    <div id="output"></div>

    <script>
        async function runAgent() {
            const btn = document.getElementById("btn");
            const originalCode = document.getElementById("original_code").value;
            const taskDescription = document.getElementById("task_description").value;
            const output = document.getElementById("output");

            btn.disabled = true;
            btn.innerText = "⏳ Running...";
            output.innerHTML = "<p>Agent is working...</p>";

            const response = await fetch('/heal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ original_code: originalCode, task_description: taskDescription })
            });

            const result = await response.json();
            btn.disabled = false;
            btn.innerText = "▶ Run Agent";

            let html = "<div class='section'><h2>Attempts</h2>";
            result.attempts.forEach((attempt, i) => {
                const isSuccess = attempt.output !== undefined;
                html += `<div class='attempt ${isSuccess ? "success" : ""}'>
                    <strong>Attempt ${i + 1} ${isSuccess ? "✅" : "❌"}</strong>
                    <pre>${attempt.error || attempt.output}</pre>
                </div>`;
            });
            html += "</div>";

            html += `<div class='section'><h2>✅ Fixed Code</h2><pre>${result.current_code}</pre></div>`;
            html += `<div class='section'><h2>💡 Explanation</h2><pre>${result.explanation}</pre></div>`;

            output.innerHTML = html;
        }
    </script>
</body>
</html>
